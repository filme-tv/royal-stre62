<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Streams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-border: rgba(201,168,76,0.25);
    --bg: #080808;
    --bg2: #0e0e0e;
    --bg3: #141414;
    --bg4: #1a1a1a;
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.45);
    --muted2: rgba(240,236,228,0.22);
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 180px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  #header {
    flex-shrink: 0;
    padding: 20px 20px 0;
    position: relative;
    z-index: 10;
  }

  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--gold);
  }

  /* ─── TABS ─── */
  #tabsWrapper { position: relative; }

  #tabsScroll {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 0 0 16px;
    scrollbar-width: none;
  }
  #tabsScroll::-webkit-scrollbar { display: none; }

  #tabsWrapper::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 50px; height: calc(100% - 16px);
    background: linear-gradient(to left, var(--bg), transparent);
    pointer-events: none;
  }

  .tab {
    flex: 0 0 auto;
    padding: 7px 17px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.22s ease;
    border: 1px solid transparent;
    color: var(--muted);
    white-space: nowrap;
    background: transparent;
  }

  .tab:hover {
    color: var(--text);
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.08);
  }

  .tab.active {
    color: #080808;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    border-color: transparent;
    font-weight: 600;
    box-shadow: 0 4px 18px rgba(201,168,76,0.35);
  }

  /* ─── DIVIDER ─── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
    margin: 0 20px;
    flex-shrink: 0;
  }

  /* ─── GRID ─── */
  #movieGrid {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    align-content: start;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-border) transparent;
  }
  #movieGrid::-webkit-scrollbar { width: 3px; }
  #movieGrid::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 3px; }

  /* ─── CARD ─── */
  .grid-item {
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.05);
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease, border-color 0.28s ease;
    position: relative;
    aspect-ratio: 2/3;
    animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }

  .grid-item:hover {
    transform: translateY(-5px) scale(1.025);
    border-color: var(--gold-border);
    box-shadow: 0 18px 42px rgba(0,0,0,0.65), 0 0 0 1px var(--gold-border);
  }

  .card-img-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: var(--bg4);
  }

  .card-img-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, var(--bg4) 30%, rgba(255,255,255,0.04) 50%, var(--bg4) 70%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    z-index: 1;
    transition: opacity 0.3s;
  }
  .card-img-wrap.loaded::before { opacity: 0; }

  .grid-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
    position: relative; z-index: 0;
  }
  .grid-item:hover img { transform: scale(1.07); }

  .card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(to top, rgba(6,6,6,0.97) 0%, rgba(6,6,6,0.5) 50%, transparent 100%);
    z-index: 2;
  }

  .card-title {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 7px 8px 8px;
    font-size: 10.5px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
    z-index: 3;
    letter-spacing: 0.1px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .grid-item:nth-child(3n+2) { animation-delay: 0.05s; }
  .grid-item:nth-child(3n+3) { animation-delay: 0.10s; }

  /* ─── SKELETON ─── */
  .skeleton-card {
    border-radius: var(--radius);
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.04);
    aspect-ratio: 2/3;
    overflow: hidden;
    position: relative;
  }
  .skeleton-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(110deg, var(--bg3) 30%, rgba(255,255,255,0.04) 50%, var(--bg3) 70%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
  }

  /* ─── EMPTY ─── */
  .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .empty-icon {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .empty-msg p { font-size: 13px; color: var(--muted); }

  /* ─── MODAL (bottom sheet) ─── */
  #modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.86);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    justify-content: center;
    align-items: flex-end;
    z-index: 2000;
  }
  #modal.show { display: flex; animation: fadeIn 0.28s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #modalContent {
    background: linear-gradient(170deg, #161616 0%, #0d0d0d 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    overflow: hidden;
    animation: sheetUp 0.34s cubic-bezier(0.16,1,0.3,1);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }

  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 34px; height: 4px;
    background: rgba(255,255,255,0.13);
    border-radius: 4px;
    margin: 13px auto 0;
    flex-shrink: 0;
  }

  .modal-hero {
    display: flex;
    gap: 16px;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }

  .modal-poster {
    width: 88px; height: 132px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg4);
    border: 1px solid rgba(255,255,255,0.07);
  }
  .modal-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .modal-info {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    justify-content: center; gap: 8px;
    padding-top: 4px;
  }

  .modal-badge {
    display: inline-flex;
    align-items: center; gap: 5px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    padding: 3px 9px;
    border-radius: 100px;
    width: fit-content;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px; font-weight: 600;
    line-height: 1.2; color: var(--text);
  }

  .modal-body {
    padding: 16px 20px 28px;
    overflow-y: auto; flex: 1;
    scrollbar-width: none;
  }
  .modal-body::-webkit-scrollbar { display: none; }

  .modal-desc {
    font-size: 13px; line-height: 1.75;
    color: var(--muted); font-weight: 300;
    margin-bottom: 20px;
  }

  .modal-sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    margin-bottom: 20px;
  }

  .btn-watch {
    width: 100%;
    padding: 15px 20px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    border: none; border-radius: var(--radius);
    color: #080808;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: all 0.22s ease;
    text-decoration: none;
    box-shadow: 0 8px 26px rgba(201,168,76,0.3);
  }
  .btn-watch:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(201,168,76,0.45); }

  .btn-close-modal {
    width: 100%; padding: 13px;
    margin-top: 10px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-close-modal:hover { background: rgba(255,255,255,0.04); color: var(--text); }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="header-logo">Royal Streams</div>
    <div id="tabsWrapper">
      <div id="tabsScroll"></div>
    </div>
  </div>
  <div class="divider"></div>
  <div id="movieGrid"></div>
</div>

<div id="modal">
  <div id="modalContent">
    <div class="modal-handle"></div>
    <div class="modal-hero">
      <div class="modal-poster">
        <img id="modalImg" src="" alt="">
      </div>
      <div class="modal-info">
        <div class="modal-badge">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Royal Streams
        </div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-sep"></div>
      <a id="modalLink" href="" target="_blank" style="text-decoration:none">
        <button class="btn-watch">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Assistir Agora
        </button>
      </a>
      <button class="btn-close-modal" id="btnCloseModal">Fechar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAlAx_HCmlYXvsUuKxOopQsAAoHUmjp5NU",
    authDomain: "royalcore-royalstreams.firebaseapp.com",
    databaseURL: "https://royalcore-royalstreams-default-rtdb.firebaseio.com",
    projectId: "royalcore-royalstreams",
    storageBucket: "royalcore-royalstreams.firebasestorage.app",
    messagingSenderId: "1065662141942",
    appId: "1:1065662141942:web:0dc0d903bb618fdfc863d7",
    measurementId: "G-3L5EWWDVKM"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);

  const tabsScroll = document.getElementById("tabsScroll");
  const movieGrid  = document.getElementById("movieGrid");
  const modal      = document.getElementById("modal");
  const modalImg   = document.getElementById("modalImg");
  const modalTitle = document.getElementById("modalTitle");
  const modalDesc  = document.getElementById("modalDesc");
  const modalLink  = document.getElementById("modalLink");
  const btnClose   = document.getElementById("btnCloseModal");

  let activeCategory  = null;
  let lastLoadedIndex = 0;
  const pageSize      = 12;

  // IntersectionObserver para lazy load
  const imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          delete img.dataset.src;
          imgObserver.unobserve(img);
        }
      }
    });
  }, { rootMargin: "120px" });

  function showSkeletons(n = 9) {
    movieGrid.innerHTML = "";
    for (let i = 0; i < n; i++) {
      const s = document.createElement("div");
      s.className = "skeleton-card";
      movieGrid.appendChild(s);
    }
  }

  async function loadCategories() {
    showSkeletons(3);
    try {
      const snap = await get(ref(db, "categorias"));
      const cats = snap.exists() ? Object.values(snap.val()) : [];
      tabsScroll.innerHTML = "";

      if (!cats.length) {
        tabsScroll.innerHTML = '<span style="color:var(--muted);font-size:12px;padding:8px 0">Nenhuma categoria</span>';
        movieGrid.innerHTML = "";
        return;
      }

      cats.forEach((cat, i) => {
        const btn = document.createElement("button");
        btn.className = "tab" + (i === 0 ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          btn.classList.add("active");
          activeCategory = cat;
          lastLoadedIndex = 0;
          loadMovies(true);
        });
        tabsScroll.appendChild(btn);
        if (i === 0) activeCategory = cat;
      });

      loadMovies(true);
    } catch (e) {
      console.error(e);
      movieGrid.innerHTML = `<div class="empty-msg"><div class="empty-icon">⚠</div><p>Erro de conexão. Tente novamente.</p></div>`;
    }
  }

  async function loadMovies(fresh = false) {
    if (!activeCategory) return;
    if (fresh) { showSkeletons(9); lastLoadedIndex = 0; }

    try {
      const snap  = await get(ref(db, `movies/${activeCategory}`));
      const items = snap.exists() ? Object.values(snap.val()) : [];

      if (!items.length) {
        movieGrid.innerHTML = `<div class="empty-msg"><div class="empty-icon">🎬</div><p>Nenhum conteúdo nesta categoria ainda.</p></div>`;
        return;
      }

      if (fresh) movieGrid.innerHTML = "";

      const paged = items.slice(lastLoadedIndex, lastLoadedIndex + pageSize);
      if (!paged.length) return;

      paged.forEach((item) => {
        const card = document.createElement("div");
        card.className = "grid-item";

        const imgWrap = document.createElement("div");
        imgWrap.className = "card-img-wrap";

        const img = document.createElement("img");
        img.alt = item.title || "";
        if (item.image) { img.dataset.src = item.image; imgObserver.observe(img); }
        img.addEventListener("load",  () => imgWrap.classList.add("loaded"));
        img.addEventListener("error", () => imgWrap.classList.add("loaded"));

        const overlay = document.createElement("div");
        overlay.className = "card-overlay";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = item.title || "";

        imgWrap.append(img, overlay, title);
        card.appendChild(imgWrap);
        card.addEventListener("click", () => openModal(item));
        movieGrid.appendChild(card);
      });

      lastLoadedIndex += pageSize;
    } catch (e) {
      console.error(e);
    }
  }

  // Infinite scroll
  movieGrid.addEventListener("scroll", () => {
    if (movieGrid.scrollTop + movieGrid.clientHeight >= movieGrid.scrollHeight - 100) {
      loadMovies(false);
    }
  });

  // Modal
  function openModal(item) {
    modalImg.src        = item.image || "";
    modalTitle.textContent = item.title || "";
    modalDesc.textContent  = item.description || "Sem descrição disponível.";
    modalLink.href      = item.link || "#";
    modal.classList.add("show");
  }

  function closeModal() { modal.classList.remove("show"); }

  modal.addEventListener("click",  e => { if (e.target === modal) closeModal(); });
  btnClose.addEventListener("click", closeModal);

  // Swipe down para fechar
  let touchY = 0;
  document.getElementById("modalContent").addEventListener("touchstart", e => { touchY = e.touches[0].clientY; });
  document.getElementById("modalContent").addEventListener("touchend",   e => { if (e.changedTouches[0].clientY - touchY > 80) closeModal(); });

  loadCategories();
</script>
</body>
</html>
