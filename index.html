<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Streams App</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #fff;
  }

  .categories-container {
    display: flex;
    overflow-x: auto;
    padding: 10px;
    gap: 10px;
    white-space: nowrap;
    background-color: #1f1f1f;
  }

  .category {
    flex: 0 0 auto;
    padding: 8px 16px;
    background-color: #3498db;
    border-radius: 20px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .category.active { background-color: #e74c3c; }
  .category:hover { background-color: #2980b9; }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
    overflow-y: auto;
    height: calc(100vh - 60px);
    box-sizing: border-box;
  }

  .grid-item {
    background-color: #1f1f1f;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .grid-item:hover { transform: scale(1.05); }

  .grid-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .grid-item h3 {
    margin: 8px 0;
    font-size: 14px;
    text-align: center;
    padding: 0 5px;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 1000;
    overflow-y: auto;
  }

  .modal-content {
    background: #1f1f1f;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    color: #fff;
  }

  .modal-content img {
    width: 100%;
    height: auto;
    border-radius: 8px;
  }

  .close-btn {
    background: #e74c3c;
    border: none;
    color: #fff;
    padding: 10px 20px;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 15px;
  }

  .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    color: #888;
    padding: 40px 0;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="categories-container" id="categoriesContainer"></div>
<div class="grid-container" id="movieGrid"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <img id="modalImg" src="" alt="">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <a id="modalLink" href="" target="_blank">
      <button class="close-btn">Assistir</button>
    </a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAlAx_HCmlYXvsUuKxOopQsAAoHUmjp5NU",
    authDomain: "royalcore-royalstreams.firebaseapp.com",
    databaseURL: "https://royalcore-royalstreams-default-rtdb.firebaseio.com",
    projectId: "royalcore-royalstreams",
    storageBucket: "royalcore-royalstreams.firebasestorage.app",
    messagingSenderId: "1065662141942",
    appId: "1:1065662141942:web:0dc0d903bb618fdfc863d7",
    measurementId: "G-3L5EWWDVKM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const categoriesContainer = document.getElementById("categoriesContainer");
  const movieGrid = document.getElementById("movieGrid");
  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");
  const modalTitle = document.getElementById("modalTitle");
  const modalDesc = document.getElementById("modalDesc");
  const modalLink = document.getElementById("modalLink");

  let activeCategory = null;
  let lastLoadedIndex = 0;
  const pageSize = 12;

  async function loadCategories() {
    try {
      const snapshot = await get(ref(db, 'categorias'));
      const categories = snapshot.exists() ? Object.values(snapshot.val()) : [];

      categoriesContainer.innerHTML = "";

      if (!categories.length) {
        categoriesContainer.innerHTML = '<span style="color:#888;padding:10px">Nenhuma categoria encontrada</span>';
        return;
      }

      categories.forEach((cat, index) => {
        const div = document.createElement("div");
        div.classList.add("category");
        if (index === 0) { div.classList.add("active"); activeCategory = cat; }
        div.innerText = cat;
        div.addEventListener("click", () => {
          document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
          div.classList.add("active");
          activeCategory = cat;
          lastLoadedIndex = 0;
          movieGrid.innerHTML = "";
          loadMovies();
        });
        categoriesContainer.appendChild(div);
      });

      loadMovies();
    } catch (e) {
      console.error("Erro ao carregar categorias:", e);
    }
  }

  async function loadMovies() {
    if (!activeCategory) return;
    try {
      const snapshot = await get(ref(db, `movies/${activeCategory}`));
      const items = snapshot.exists() ? Object.values(snapshot.val()) : [];

      if (!items.length && lastLoadedIndex === 0) {
        movieGrid.innerHTML = '<div class="empty-msg">Nenhum conteúdo nesta categoria.</div>';
        return;
      }

      const paged = items.slice(lastLoadedIndex, lastLoadedIndex + pageSize);
      paged.forEach(item => {
        const card = document.createElement("div");
        card.classList.add("grid-item");
        card.innerHTML = `<img data-src="${item.image}" alt="${item.title}" class="lazy"><h3>${item.title}</h3>`;
        card.addEventListener("click", () => openModal(item));
        movieGrid.appendChild(card);
      });

      lastLoadedIndex += pageSize;
      lazyLoadImages();
    } catch (e) {
      console.error("Erro ao carregar itens:", e);
    }
  }

  function lazyLoadImages() {
    document.querySelectorAll('.lazy').forEach(img => {
      if (img.dataset.src && img.getBoundingClientRect().top < window.innerHeight + 100) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
        img.classList.remove('lazy');
      }
    });
  }

  window.addEventListener('scroll', lazyLoadImages);

  movieGrid.addEventListener("scroll", () => {
    if (movieGrid.scrollTop + movieGrid.clientHeight >= movieGrid.scrollHeight - 10) {
      loadMovies();
    }
  });

  function openModal(item) {
    modalImg.src = item.image || "";
    modalTitle.textContent = item.title || "";
    modalDesc.textContent = item.description || "Descrição não disponível.";
    modalLink.href = item.link || "#";
    modal.style.display = "flex";
  }

  modal.addEventListener("click", (e) => {
    if (e.target === modal) modal.style.display = "none";
  });

  loadCategories();
</script>
</body>
</html>
